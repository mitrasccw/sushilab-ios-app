workflows:
  ios_simulator_debug:
    name: Cordova iOS Simulator Debug
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      cocoapods: default
      node: 20.11.1
      vars:
        CORDOVA_PROJECT_DIR: "."
    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/Library/Caches/CocoaPods
        - $CORDOVA_PROJECT_DIR/node_modules
    scripts:
      - name: Install npm dependencies
        script: |
          cd "$CORDOVA_PROJECT_DIR"
          npm ci || npm install

      - name: Recreate iOS platform cleanly
        script: |
          cd "$CORDOVA_PROJECT_DIR"
          cordova platform rm ios || true
          cordova platform add ios
          cordova plugin add cordova-plugin-inappbrowser || true
          cordova prepare ios

      - name: Show Cordova project state
        script: |
          cd "$CORDOVA_PROJECT_DIR"
          cordova platform ls
          cordova plugin ls

      - name: Build iOS simulator app
        script: |
          cd "$CORDOVA_PROJECT_DIR"
          cordova build ios --debug --emulator

    artifacts:
      - $CORDOVA_PROJECT_DIR/platforms/ios/build/emulator/*.app
      - $CORDOVA_PROJECT_DIR/platforms/ios/build/emulator/*.dSYM
      - $CORDOVA_PROJECT_DIR/platforms/ios/build/**/*.app
      - $CORDOVA_PROJECT_DIR/platforms/ios/build/**/*.dSYM